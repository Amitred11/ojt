{% extends "base.html" %}
{% block content %}
<div class="flex items-center gap-4 mb-8">
    <a href="{{ url_for('portfolio.list_reports') }}" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400 hover:bg-white/10">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <h1 class="text-2xl font-800">New Report</h1>
</div>

<form method="POST" enctype="multipart/form-data" class="space-y-5 pb-10">
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Week Ending</label>
        <input type="date" name="week_end_date" value="{{ today }}" required class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition-all text-sm font-semibold">
    </div>
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Activities</label>
        <textarea name="activities" rows="3" class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-sm bg-transparent" placeholder="Tasks done..."></textarea>
    </div>
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Learnings</label>
        <textarea name="learnings" rows="3" class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-sm bg-transparent" placeholder="Skills gained..."></textarea>
    </div>
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Reflections</label>
        <textarea name="reflections" rows="3" class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-sm bg-transparent" placeholder="Thoughts..."></textarea>
    </div>
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Photo</label>
        <input type="file" name="photo" accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-500/10 file:text-indigo-400">
    </div>
    <button class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-800 py-4 rounded-2xl shadow-lg mt-4">Save Report</button>
</form>
{% endblock %}
