{% extends "base.html" %}
{% block content %}
<div class="h-[80vh] flex flex-col justify-center">
    <h1 class="text-4xl font-800 mb-2 text-white">Register</h1>
    <p class="text-slate-400 mb-8">Create your account</p>
    {% if error %}
    <div class="bg-red-500/10 text-red-400 p-3 rounded-xl text-sm font-bold mb-4 text-center">{{ error }}</div>
    {% endif %}
    <form method="POST" class="space-y-4">
        <input type="text" name="username" placeholder="Choose Username" required class="w-full input-glass rounded-2xl px-5 py-4 outline-none focus:border-indigo-500 transition-all font-semibold">
        <input type="password" name="password" placeholder="Choose Password" required class="w-full input-glass rounded-2xl px-5 py-4 outline-none focus:border-indigo-500 transition-all font-semibold">
        <button class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-800 py-4 rounded-2xl mt-4 shadow-lg shadow-cyan-600/20">Register</button>
    </form>
    <div class="mt-6 text-center text-sm text-slate-500 font-semibold">
        <a href="{{ url_for('auth.login') }}" class="text-indigo-400">Back to Login</a>
    </div>
</div>
{% endblock %}
