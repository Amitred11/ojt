{% extends "base.html" %}
{% block content %}
<div class="h-[80vh] flex flex-col justify-center relative">
    
    <div class="text-center mb-8">
        <!-- Badge -->
        <div class="inline-flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20 rounded-full px-3 py-1 mb-4">
            <i data-lucide="shield-alert" class="w-3 h-3 text-indigo-400"></i>
            <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Restricted Access</span>
        </div>
        <h1 class="text-4xl font-900 tracking-tighter text-white mb-2">Register</h1>
        <p class="text-slate-400 font-medium">Enter credentials to create account.</p>
    </div>

    <form method="POST" class="space-y-4 card-glass p-8 rounded-[2.5rem] shadow-2xl border-t border-white/10 relative overflow-hidden">
        <!-- Shine effect on card -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>

        <!-- 1. Username Field -->
        <div class="group">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-3 mb-1 block">Choose Username</label>
            <div class="relative">
                <i data-lucide="user-plus" class="absolute left-4 top-4 w-5 h-5 text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
                <input type="text" name="username" placeholder="username" required class="w-full input-glass rounded-2xl pl-12 pr-5 py-4 outline-none focus:border-indigo-500/50 transition-all font-bold text-white placeholder-slate-600">
            </div>
        </div>
        
        <!-- 2. Password Field -->
        <div class="group">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-3 mb-1 block">Set Password</label>
            <div class="relative">
                <i data-lucide="key" class="absolute left-4 top-4 w-5 h-5 text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
                <input type="password" name="password" placeholder="••••••••" required class="w-full input-glass rounded-2xl pl-12 pr-5 py-4 outline-none focus:border-indigo-500/50 transition-all font-bold text-white placeholder-slate-600">
            </div>
        </div>

        <!-- 3. NEW: Security Code Field -->
        <div class="group">
            <label class="text-[10px] font-bold text-rose-400 uppercase tracking-widest ml-3 mb-1 block flex items-center gap-1">
                <i data-lucide="lock" class="w-3 h-3"></i> Master Access Key
            </label>
            <div class="relative">
                <i data-lucide="shield-check" class="absolute left-4 top-4 w-5 h-5 text-slate-500 group-focus-within:text-rose-400 transition-colors"></i>
                <!-- type="password" hides the number while typing -->
                <input type="password" name="security_code" placeholder="Enter Admin Pin" required class="w-full input-glass rounded-2xl pl-12 pr-5 py-4 outline-none focus:border-rose-500/50 transition-all font-bold text-white placeholder-slate-600">
            </div>
        </div>

        <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-900 py-4 rounded-2xl mt-4 shadow-lg shadow-indigo-600/20 active:scale-[0.98] transition-all">
            Verify & Create
        </button>
    </form>

    <div class="mt-8 text-center text-sm text-slate-500 font-semibold">
        Already a member? <br>
        <a href="{{ url_for('auth.login') }}" class="text-indigo-400 hover:text-indigo-300 underline underline-offset-4 decoration-indigo-500/30">Login here</a>
    </div>
</div>
{% endblock %}
