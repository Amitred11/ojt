{% extends "base.html" %}
{% block content %}
<div class="h-[80vh] flex flex-col justify-center relative">
    
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-full px-3 py-1 mb-4">
            <i data-lucide="wrench" class="w-3 h-3 text-red-400"></i>
            <span class="text-[10px] font-bold text-red-400 uppercase tracking-widest">System Tool</span>
        </div>
        <h1 class="text-4xl font-900 tracking-tighter text-white mb-2">Account Fixer</h1>
        <p class="text-slate-400 font-medium">Convert old account to new security format.</p>
    </div>

    <form method="POST" class="space-y-4 card-glass p-8 rounded-[2.5rem] shadow-2xl border-t border-red-500/20 relative overflow-hidden">
        
        <div class="bg-red-500/10 p-4 rounded-xl border border-red-500/20 mb-4">
            <p class="text-xs text-red-300">
                <strong>Warning:</strong> Use this only for old accounts that cannot login. 
                It will encrypt the plain-text password currently in the database.
            </p>
        </div>

        <div class="group">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-3 mb-1 block">Username</label>
            <div class="relative">
                <i data-lucide="user" class="absolute left-4 top-4 w-5 h-5 text-slate-500 group-focus-within:text-red-400 transition-colors"></i>
                <input type="text" name="username" placeholder="e.g. loyloy" required class="w-full input-glass rounded-2xl pl-12 pr-5 py-4 outline-none focus:border-red-500/50 transition-all font-bold text-white placeholder-slate-600">
            </div>
        </div>
        
        <div class="group">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-3 mb-1 block">Old Password (Plain Text)</label>
            <div class="relative">
                <i data-lucide="unlock" class="absolute left-4 top-4 w-5 h-5 text-slate-500 group-focus-within:text-red-400 transition-colors"></i>
                <input type="text" name="password" placeholder="e.g. amadore007" required class="w-full input-glass rounded-2xl pl-12 pr-5 py-4 outline-none focus:border-red-500/50 transition-all font-bold text-white placeholder-slate-600">
            </div>
        </div>

        <button class="w-full bg-red-600 hover:bg-red-500 text-white font-900 py-4 rounded-2xl mt-4 shadow-lg shadow-red-600/20 active:scale-[0.98] transition-all">
            Fix Account & Save
        </button>
    </form>
    
    <div class="mt-8 text-center">
        <a href="{{ url_for('auth.login') }}" class="text-xs font-bold text-slate-500 hover:text-white">Cancel</a>
    </div>
</div>
{% endblock %}
