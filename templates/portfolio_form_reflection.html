{% extends "base.html" %}
{% block content %}
<div class="flex items-center gap-4 mb-8">
    <a href="{{ url_for('portfolio.list_reports') }}" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400 hover:bg-white/10">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <h1 class="text-2xl font-800">Reflection</h1>
</div>

<form method="POST" class="space-y-5 pb-10">
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Month</label>
        <input type="date" name="month_date" value="{{ today }}" required class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition-all text-sm font-semibold">
    </div>
    
    <!-- Specific Fields from PDF Section 5 -->
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Monthly Reflection</label>
        <p class="text-[10px] text-slate-400 mb-2">Summarize major challenges and successes.</p>
        <textarea name="monthly_reflection" rows="5" class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-sm bg-transparent"></textarea>
    </div>
    
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Self-Evaluation</label>
        <p class="text-[10px] text-slate-400 mb-2">Honesty about your performance and areas for improvement.</p>
        <textarea name="self_evaluation" rows="4" class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-sm bg-transparent"></textarea>
    </div>

    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Supervisory Feedback</label>
        <p class="text-[10px] text-slate-400 mb-2">Summarize critiques or feedback received from your mentor.</p>
        <textarea name="feedback" rows="3" class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-sm bg-transparent"></textarea>
    </div>

    <button class="w-full bg-purple-600 hover:bg-purple-500 text-white font-800 py-4 rounded-2xl shadow-lg mt-4">Save Reflection</button>
</form>
{% endblock %}
