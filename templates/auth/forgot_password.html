{% extends "main/base.html" %}
{% block content %}
<div class="h-[80vh] flex flex-col justify-center max-w-md mx-auto px-6">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-900 text-white italic uppercase tracking-tighter">Account Recovery</h1>
        <p class="text-slate-500 text-sm mt-2">Enter your username to initiate reset.</p>
    </div>

    <form method="POST" class="space-y-4 bg-slate-900/40 p-8 rounded-[2rem] border border-white/10 backdrop-blur-xl">
        <div class="space-y-1">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Username</label>
            <input type="text" name="username" required placeholder="e.g. rinyurin" 
                   class="w-full bg-black/40 border border-white/5 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-indigo-500 transition-all">
        </div>
        <button class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-indigo-500 hover:text-white transition-all uppercase text-xs tracking-widest">
            Identify Account
        </button>
        <a href="{{ url_for('auth.login') }}" class="block text-center text-[10px] font-black text-slate-600 uppercase pt-2">Back to Login</a>
    </form>
</div>
{% endblock %}
