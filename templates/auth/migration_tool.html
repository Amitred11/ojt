{% extends "main/base.html" %}
{% block content %}
<div class="h-[80vh] flex flex-col justify-center relative px-4">
    
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-full px-3 py-1 mb-4">
            <i data-lucide="wrench" class="w-3 h-3 text-red-400"></i>
            <span class="text-[10px] font-bold text-red-400 uppercase tracking-widest">System Tool</span>
        </div>
        <h1 class="text-4xl font-900 tracking-tighter text-white mb-2 italic">Account Fixer</h1>
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Security Migration Protocol</p>
    </div>

    <form method="POST" class="max-w-md mx-auto w-full space-y-4 card-glass p-8 rounded-[2.5rem] shadow-2xl border-t border-red-500/20 relative overflow-hidden">
        
        <div class="bg-red-500/10 p-4 rounded-xl border border-red-500/20 mb-4">
            <p class="text-[10px] text-red-300 font-bold uppercase mb-1">Migration Warning</p>
            <p class="text-[11px] text-slate-400 leading-relaxed">
                Use this only if your account was created in the <strong>Old System</strong>. 
                This will encrypt your plain-text password and approve your status.
            </p>
        </div>

        <div class="group">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-3 mb-1 block">Username</label>
            <div class="relative">
                <i data-lucide="user" class="absolute left-4 top-4 w-5 h-5 text-slate-500 group-focus-within:text-red-400 transition-colors"></i>
                <input type="text" name="username" placeholder="Gilbert or email..." required 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-5 py-4 outline-none focus:border-red-500/50 transition-all font-bold text-white placeholder-slate-600">
            </div>
        </div>
        
        <div class="group">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-3 mb-1 block">Old Password (Plain Text)</label>
            <div class="relative">
                <i data-lucide="unlock" class="absolute left-4 top-4 w-5 h-5 text-slate-500 group-focus-within:text-red-400 transition-colors"></i>
                <input type="password" name="password" placeholder="e.g. 6133175" required 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-5 py-4 outline-none focus:border-red-500/50 transition-all font-bold text-white placeholder-slate-600">
            </div>
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white font-900 py-4 rounded-2xl mt-4 shadow-lg shadow-red-600/20 active:scale-[0.98] transition-all uppercase tracking-widest text-xs">
            Fix Account & Migrate
        </button>
    </form>
    
    <div class="mt-8 text-center">
        <a href="{{ url_for('auth.login') }}" class="text-[10px] font-black text-slate-500 hover:text-white uppercase tracking-widest transition-colors">
            <i data-lucide="arrow-left" class="inline w-3 h-3 mr-1"></i> Back to Login
        </a>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
{% endblock %}
