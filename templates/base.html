<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .card-glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-glass { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); }
        input[type="time"], input[type="date"] { color-scheme: dark; }
    </style>
</head>
<body class="min-h-screen pb-24">
    {% if session.get('user_id') %}
    <nav class="fixed bottom-0 w-full z-50 card-glass border-t border-white/10 px-6 py-4 flex justify-around items-center rounded-t-3xl backdrop-blur-xl">
        <a href="{{ url_for('tracker.index') }}" class="flex flex-col items-center gap-1 text-xs font-bold {{ 'text-indigo-400' if request.endpoint == 'tracker.index' else 'text-slate-500' }}">
            <i data-lucide="clock" class="w-6 h-6"></i>
        </a>
        <a href="{{ url_for('portfolio.list_reports') }}" class="flex flex-col items-center gap-1 text-xs font-bold {{ 'text-indigo-400' if 'portfolio' in request.endpoint else 'text-slate-500' }}">
            <i data-lucide="book-open" class="w-6 h-6"></i>
        </a>
        <a href="{{ url_for('auth.logout') }}" class="flex flex-col items-center gap-1 text-xs font-bold text-slate-500">
            <i data-lucide="log-out" class="w-6 h-6"></i>
        </a>
    </nav>
    {% endif %}

    <div class="max-w-md mx-auto px-6 pt-12">
        {% block content %}{% endblock %}
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
