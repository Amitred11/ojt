{% extends "base.html" %}
{% block content %}
<div class="flex items-center gap-4 mb-8">
    <a href="{{ url_for('portfolio.list_reports') }}" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400 hover:bg-white/10">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <h1 class="text-2xl font-800">Upload Signed DTR</h1>
</div>

<!-- Ensure action points to correct route -->
<form action="{{ url_for('portfolio.upload_dtr') }}" method="POST" enctype="multipart/form-data" class="space-y-6 pb-10">
    <!-- Same content as before -->
    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Description / Period</label>
        <input type="text" name="description" placeholder="e.g. January 1-15, 2026" required class="w-full input-glass rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-sm text-white">
    </div>

    <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">DTR Images</label>
        <input type="file" name="dtr_photos" multiple accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-4 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-bold file:uppercase file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer">
        <p class="text-[10px] text-slate-500 mt-2 text-right">Supported: JPG, PNG. Multiple pages allowed.</p>
    </div>

    <button class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-800 py-4 rounded-2xl shadow-lg mt-4 flex justify-center gap-2">
        <i data-lucide="upload-cloud" class="w-5 h-5"></i>
        <span>Upload Documents</span>
    </button>
</form>
{% endblock %}
