{% extends "base.html" %}
{% block content %}
<div class="flex items-center gap-4 mb-6">
    <a href="{{ url_for('portfolio.list_reports') }}" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400 hover:bg-white/10">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <h1 class="text-2xl font-800">Journal Setup</h1>
</div>

<form method="POST" class="space-y-8 pb-10">
    <!-- Section 1: Student Profile -->
    <div class="card-glass rounded-[2rem] p-6">
        <h2 class="text-indigo-400 font-bold uppercase tracking-widest text-xs mb-4">Student Trainee Profile</h2>
        <div class="grid gap-4">
            <input type="text" name="full_name" value="{{ p.full_name }}" placeholder="Full Name" class="input-glass rounded-xl px-4 py-3 w-full text-sm">
            <input type="text" name="course" value="{{ p.course }}" placeholder="Course / Major" class="input-glass rounded-xl px-4 py-3 w-full text-sm">
            <input type="text" name="duration" value="{{ p.duration }}" placeholder="Duration (e.g. 600 Hours)" class="input-glass rounded-xl px-4 py-3 w-full text-sm">
            <textarea name="objectives" rows="3" placeholder="Learning Objectives (Skills you intend to acquire)" class="input-glass rounded-xl px-4 py-3 w-full text-sm bg-transparent">{{ p.objectives }}</textarea>
        </div>
    </div>

    <!-- Section 2: Training Details -->
    <div class="card-glass rounded-[2rem] p-6">
        <h2 class="text-emerald-400 font-bold uppercase tracking-widest text-xs mb-4">Training Details</h2>
        <div class="grid gap-4">
            <input type="text" name="hte_name" value="{{ p.hte_name }}" placeholder="Host Training Establishment (Company Name)" class="input-glass rounded-xl px-4 py-3 w-full text-sm">
            <input type="text" name="supervisor" value="{{ p.supervisor }}" placeholder="Direct Supervisor Name" class="input-glass rounded-xl px-4 py-3 w-full text-sm">
        </div>
    </div>

    <!-- Section 3: Company Overview -->
    <div class="card-glass rounded-[2rem] p-6">
        <h2 class="text-cyan-400 font-bold uppercase tracking-widest text-xs mb-4">Company Overview</h2>
        <div class="grid gap-4">
            <textarea name="company_desc" rows="3" placeholder="Company Profile (Mission/Vision)" class="input-glass rounded-xl px-4 py-3 w-full text-sm bg-transparent">{{ p.company_desc }}</textarea>
            <textarea name="dept_desc" rows="3" placeholder="Department Description (Specific functions)" class="input-glass rounded-xl px-4 py-3 w-full text-sm bg-transparent">{{ p.dept_desc }}</textarea>
        </div>
    </div>

    <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-800 py-4 rounded-2xl shadow-lg">Save Profile</button>
</form>
{% endblock %}
