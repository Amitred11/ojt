{% extends "main/base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{{ url_for('portfolio.list_reports') }}" class="w-11 h-11 rounded-2xl bg-white/5 backdrop-blur-md border border-white/10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-3xl font-black tracking-tight text-white">Journal Setup</h1>
    </div>

    <!-- ADDED enctype for file uploads -->
    <form method="POST" enctype="multipart/form-data" class="space-y-6 pb-12">
        
        <!-- SECTION 1: PRELIMINARY (New based on Guide) -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-purple-500 to-pink-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-purple-500 rounded-full"></div>
                    <h2 class="text-purple-400 font-bold uppercase tracking-[0.2em] text-xs">Preliminary Details</h2>
                </div>
                <div class="grid gap-5">
                    <input type="text" name="coordinator_name" value="{{ p.coordinator_name }}" placeholder="OJT Coordinator Name (for Approval Sheet)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">
                    <textarea name="acknowledgement" rows="3" placeholder="Acknowledgement Text (Brief thank you section)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white resize-none focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">{{ p.acknowledgement }}</textarea>
                </div>
            </div>
        </div>

        <!-- Section 2: Student Profile (Existing) -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-blue-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-indigo-500 rounded-full"></div>
                    <h2 class="text-indigo-400 font-bold uppercase tracking-[0.2em] text-xs">Student Trainee Profile</h2>
                </div>
                <div class="grid gap-5">
                    <input type="text" name="full_name" value="{{ p.full_name }}" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                    <input type="text" name="course" value="{{ p.course }}" placeholder="Course / Major" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                    <input type="text" name="duration" value="{{ p.duration }}" placeholder="Duration (e.g. 600 Hours)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                    <textarea name="objectives" rows="3" placeholder="Learning Objectives (Specific skills to acquire)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white resize-none focus:ring-2 focus:ring-indigo-500/50 transition-all">{{ p.objectives }}</textarea>
                </div>
            </div>
        </div>

        <!-- SECTION 3: COMPANY & STRUCTURE (Updated) -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-cyan-500 rounded-full"></div>
                    <h2 class="text-cyan-400 font-bold uppercase tracking-[0.2em] text-xs">Company Overview</h2>
                </div>
                <div class="grid gap-5">
                    <input type="text" name="hte_name" value="{{ p.hte_name }}" placeholder="Company Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white">
                    <input type="text" name="supervisor" value="{{ p.supervisor }}" placeholder="Supervisor Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white">
                    <textarea name="company_desc" rows="2" placeholder="Company Profile (History/Mission)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white resize-none">{{ p.company_desc }}</textarea>
                    
                    <div class="p-4 bg-white/5 border border-white/10 rounded-xl">
                        <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Organizational Structure (Image)</label>
                        <input type="file" name="structure_img" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-500/20 file:text-indigo-400">
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION 4: DOCUMENTATION (New - Appendices) -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-orange-500 to-yellow-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-orange-500 rounded-full"></div>
                    <h2 class="text-orange-400 font-bold uppercase tracking-[0.2em] text-xs">Final Documentation</h2>
                </div>
                <div class="grid gap-5">
                    <div class="p-4 bg-white/5 border border-white/10 rounded-xl">
                        <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Certificate of Completion</label>
                        <input type="file" name="certificate_img" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-orange-500/20 file:text-orange-400">
                    </div>
                    <div class="p-4 bg-white/5 border border-white/10 rounded-xl">
                        <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Samples of Work (Multiple Images)</label>
                        <input type="file" name="work_samples" multiple class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-emerald-500/20 file:text-emerald-400">
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full py-4 font-bold text-white bg-indigo-600 rounded-2xl hover:bg-indigo-500 transition-all shadow-lg">
            Save Journal Profile
        </button>
    </form>
</div>
{% endblock %}
