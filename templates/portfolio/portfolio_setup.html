{% extends "main/base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{{ url_for('portfolio.list_reports') }}" class="w-11 h-11 rounded-2xl bg-white/5 backdrop-blur-md border border-white/10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-3xl font-black tracking-tight text-white">Journal Setup</h1>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-6 pb-12">
        
        <!-- SECTION 1: PRELIMINARY -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-purple-500 to-pink-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-purple-500 rounded-full"></div>
                    <h2 class="text-purple-400 font-bold uppercase tracking-[0.2em] text-xs">1. Preliminary Pages</h2>
                </div>
                <div class="grid gap-5">
                    <input type="text" name="coordinator_name" value="{{ p.coordinator_name }}" placeholder="OJT Coordinator Name (for Approval Sheet)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">
                    <textarea name="acknowledgement" rows="3" placeholder="Acknowledgement Text (Brief thank you section)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white resize-none focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">{{ p.acknowledgement }}</textarea>
                </div>
            </div>
        </div>

        <!-- SECTION 2: STUDENT TRAINEE PROFILE -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-blue-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-indigo-500 rounded-full"></div>
                    <h2 class="text-indigo-400 font-bold uppercase tracking-[0.2em] text-xs">2. Student Trainee Profile</h2>
                </div>
                
                <!-- Personal Information -->
                <div class="mb-5">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Personal Information</p>
                    <div class="grid gap-4">
                        <input type="text" name="full_name" value="{{ p.full_name }}" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        
                        <!-- SEPARATED CONTACT DETAILS -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <input type="email" name="email" value="{{ p.email }}" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                            <input type="tel" name="phone" value="{{ p.phone }}" placeholder="Phone Number" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        </div>

                        <!-- EXPLICIT EDUCATIONAL BACKGROUND -->
                        <input type="text" name="course" value="{{ p.course }}" placeholder="Educational Background (e.g., BS Information Technology)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        
                        <!-- PROFESSIONAL PHOTO -->
                        <div class="p-4 bg-white/5 border border-white/10 rounded-xl">
                            <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Professional Photo</label>
                            <input type="file" name="profile_photo" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-500/20 file:text-indigo-400">
                        </div>
                    </div>
                </div>

                <div class="h-px w-full bg-white/5 my-6"></div>

                <!-- Training Details -->
                <div class="mb-5">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Training Details</p>
                    <div class="grid gap-4">
                        <input type="text" name="hte_name" value="{{ p.hte_name }}" placeholder="Host Training Establishment (HTE) Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <input type="text" name="dept_assigned" value="{{ p.dept_assigned }}" placeholder="Department Assigned" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <input type="text" name="supervisor" value="{{ p.supervisor }}" placeholder="Direct Supervisor's Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <input type="text" name="duration" value="{{ p.duration }}" placeholder="Duration (e.g. 600 Hours)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                    </div>
                </div>

                <div class="h-px w-full bg-white/5 my-6"></div>

                <!-- Learning Objectives -->
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Learning Objectives</p>
                    <textarea name="objectives" rows="3" placeholder="Specific skills or knowledge you intended to acquire" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white resize-none focus:ring-2 focus:ring-indigo-500/50 transition-all">{{ p.objectives }}</textarea>
                </div>
            </div>
        </div>

        <!-- SECTION 3: COMPANY OVERVIEW -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500 to-teal-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-cyan-500 rounded-full"></div>
                    <h2 class="text-cyan-400 font-bold uppercase tracking-[0.2em] text-xs">3. Company Overview</h2>
                </div>
                
                <div class="grid gap-6">
                    <!-- Company Profile -->
                    <div>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Company Profile</p>
                        <textarea name="company_desc" rows="3" placeholder="History, mission, vision, and core values..." class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white resize-none focus:ring-2 focus:ring-cyan-500/50 outline-none transition-all">{{ p.company_desc }}</textarea>
                    </div>

                    <!-- Department Description -->
                    <div>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Department Description</p>
                        <textarea name="dept_desc" rows="3" placeholder="Specific functions of the office where you were deployed..." class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white resize-none focus:ring-2 focus:ring-cyan-500/50 outline-none transition-all">{{ p.dept_desc }}</textarea>
                    </div>

                    <!-- Organizational Structure -->
                    <div class="p-4 bg-white/5 border border-white/10 rounded-xl">
                        <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Organizational Structure (Hierarchy Chart)</label>
                        <input type="file" name="structure_img" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-cyan-500/20 file:text-cyan-400">
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION 4: DOCUMENTATION (Updated for Pairs) -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-orange-500 to-yellow-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-orange-500 rounded-full"></div>
                    <h2 class="text-orange-400 font-bold uppercase tracking-[0.2em] text-xs">4. Appendices & Documentation</h2>
                </div>
                
                <div class="grid gap-5">
                    <!-- Certificate Section -->
                    <div class="p-4 bg-white/5 border border-white/10 rounded-xl">
                        <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Certificate of Completion</label>
                        <input type="file" name="certificate_img" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-orange-500/20 file:text-orange-400">
                    </div>

                    <!-- Dynamic Samples of Work -->
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Samples of Work</label>
                            <button type="button" onclick="addWorkSample()" class="text-[10px] bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full font-bold hover:bg-emerald-500/30 transition-all flex items-center gap-1">
                                <i data-lucide="plus" class="w-3 h-3"></i> ADD SAMPLE
                            </button>
                        </div>

                        <div id="samples-container" class="space-y-4">
                            <!-- If editing, you might want to show existing samples here, 
                                but usually, we use this for new additions -->
                            <div class="sample-item p-5 bg-white/5 border border-white/10 rounded-2xl space-y-4">
                                <div>
                                    <label class="text-[9px] font-bold text-slate-400 uppercase mb-2 block">Upload Image</label>
                                    <input type="file" name="work_images" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-white/10 file:text-slate-300">
                                </div>
                                <div>
                                    <label class="text-[9px] font-bold text-slate-400 uppercase mb-2 block">Description</label>
                                    <textarea name="work_descriptions" rows="2" placeholder="Describe this specific task..." class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:ring-2 focus:ring-emerald-500/50 outline-none transition-all resize-none"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Submit -->
        <button type="submit" class="w-full py-4 font-bold text-white bg-indigo-600 rounded-2xl hover:bg-indigo-500 transition-all shadow-lg active:scale-95">
            Save Journal Profile
        </button>
    </form>
</div>

<script>
    function addWorkSample() {
        const container = document.getElementById('samples-container');
        const newSample = document.createElement('div');
        
        newSample.className = 'sample-item p-5 bg-white/5 border border-white/10 rounded-2xl space-y-4 relative animate-in fade-in slide-in-from-top-2 duration-300';
        newSample.innerHTML = `
            <button type="button" onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <div>
                <label class="text-[9px] font-bold text-slate-400 uppercase mb-2 block">Upload Image</label>
                <input type="file" name="work_images" class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-white/10 file:text-slate-300">
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-400 uppercase mb-2 block">Description</label>
                <textarea name="work_descriptions" rows="2" placeholder="Describe this specific task..." class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:ring-2 focus:ring-emerald-500/50 outline-none transition-all resize-none"></textarea>
            </div>
        `;
        container.appendChild(newSample);
        if (window.lucide) lucide.createIcons();
    }
</script>
{% endblock %}
