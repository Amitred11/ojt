{% extends "main/base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{{ url_for('portfolio.list_reports') }}" class="w-11 h-11 rounded-2xl bg-white/5 backdrop-blur-md border border-white/10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-3xl font-black tracking-tight text-white">Journal Setup</h1>
    </div>

    <form method="POST" class="space-y-6 pb-12" onsubmit="showUploading()">
        <!-- Section 1: Student Profile -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-blue-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-indigo-500 rounded-full"></div>
                    <h2 class="text-indigo-400 font-bold uppercase tracking-[0.2em] text-xs">Student Trainee Profile</h2>
                </div>
                <div class="grid gap-5">
                    <input type="text" name="full_name" value="{{ p.full_name }}" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:bg-white/10 transition-all">
                    <input type="text" name="course" value="{{ p.course }}" placeholder="Course / Major" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:bg-white/10 transition-all">
                    <input type="text" name="duration" value="{{ p.duration }}" placeholder="Duration (e.g. 600 Hours)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:bg-white/10 transition-all">
                    <textarea name="objectives" rows="3" placeholder="Learning Objectives (Skills you intend to acquire)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:bg-white/10 transition-all resize-none">{{ p.objectives }}</textarea>
                </div>
            </div>
        </div>

        <!-- Section 2: Training Details -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-emerald-500 rounded-full"></div>
                    <h2 class="text-emerald-400 font-bold uppercase tracking-[0.2em] text-xs">Training Details</h2>
                </div>
                <div class="grid gap-5">
                    <input type="text" name="hte_name" value="{{ p.hte_name }}" placeholder="Host Training Establishment (Company Name)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:bg-white/10 transition-all">
                    <input type="text" name="supervisor" value="{{ p.supervisor }}" placeholder="Direct Supervisor Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:bg-white/10 transition-all">
                </div>
            </div>
        </div>

        <!-- Section 3: Company Overview -->
        <div class="relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-500"></div>
            <div class="relative card-glass rounded-[2rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-cyan-500 rounded-full"></div>
                    <h2 class="text-cyan-400 font-bold uppercase tracking-[0.2em] text-xs">Company Overview</h2>
                </div>
                <div class="grid gap-5">
                    <textarea name="company_desc" rows="3" placeholder="Company Profile (Mission/Vision)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:bg-white/10 transition-all resize-none">{{ p.company_desc }}</textarea>
                    <textarea name="dept_desc" rows="3" placeholder="Department Description (Specific functions)" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:bg-white/10 transition-all resize-none">{{ p.dept_desc }}</textarea>
                </div>
            </div>
        </div>

        <button class="group relative w-full inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-indigo-600 font-pj rounded-2xl focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-600 hover:bg-indigo-500 elevation-lg">
            Save Profile
        </button>
    </form>
</div>
{% endblock %}
