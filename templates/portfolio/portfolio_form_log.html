{% extends "main/base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="{{ url_for('portfolio.list_reports') }}" class="w-11 h-11 rounded-2xl bg-white/5 backdrop-blur-md border border-white/10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-3xl font-black tracking-tight text-white">Weekly Log</h1>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-5 pb-12" onsubmit="showUploading()">
        <div class="card-glass rounded-[2.5rem] p-8 border border-white/10 bg-slate-900/40 backdrop-blur-xl space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-emerald-400 uppercase tracking-widest ml-1">Week Ending</label>
                    <input type="date" name="week_end_date" value="{{ today }}" required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 text-sm text-white focus:ring-2 focus:ring-emerald-500/50 transition-all [color-scheme:dark]">
                </div>
                
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-emerald-400 uppercase tracking-widest ml-1">Documentation</label>
                    <input type="file" name="photos" multiple accept="image/*" class="w-full text-[10px] text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-emerald-500/10 file:text-emerald-400 hover:file:bg-emerald-500/20 cursor-pointer">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-black text-emerald-400 uppercase tracking-widest ml-1">Task Description</label>
                <textarea name="tasks" rows="4" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-600 focus:ring-2 focus:ring-emerald-500/50 transition-all" placeholder="- Created API endpoints..."></textarea>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-black text-emerald-400 uppercase tracking-widest ml-1">Competencies Applied</label>
                <textarea name="competencies" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-600 focus:ring-2 focus:ring-emerald-500/50 transition-all" placeholder="Applied Python knowledge..."></textarea>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-black text-emerald-400 uppercase tracking-widest ml-1">New Knowledge Gained</label>
                <textarea name="knowledge" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-sm text-white placeholder:text-slate-600 focus:ring-2 focus:ring-emerald-500/50 transition-all" placeholder="Learned Mongo Aggregation..."></textarea>
            </div>

            <button class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-[0.99] mt-4">
                Save Entry
            </button>
        </div>
    </form>
</div>
{% endblock %}
